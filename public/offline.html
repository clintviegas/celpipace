<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — CELPIPACE</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F8FAFC;
        color: #0f172a;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #fff;
        border-radius: 18px;
        padding: 40px 32px;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        text-align: center;
      }
      .icon { font-size: 46px; margin-bottom: 8px; }
      h1 { font-size: 22px; font-weight: 700; margin: 8px 0 12px; }
      p { font-size: 15px; line-height: 1.6; color: #64748b; margin: 0 0 22px; }
      button {
        background: #0f172a;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 22px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>It looks like you've lost your connection. Pages you've already visited stay available — reconnect to keep practising and to save your progress.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
